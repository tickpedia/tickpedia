name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # generated/semilayer is gitignored — re-emit before any TS step.
      # `semilayer generate` is fully local (reads sl.config.ts), no
      # network or secrets required.
      - run: pnpm semilayer:generate

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

  e2e:
    name: E2E (hermetic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm semilayer:generate

      - run: pnpm --filter @tickpedia/e2e install-browsers

      - run: pnpm e2e
        env:
          CI: 'true'

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 7
